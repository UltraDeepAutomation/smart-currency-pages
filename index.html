<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Smart Currency</title>
  <style>:root {
  color-scheme: light dark;
  --background: #0b0b0c;
  --surface: #171719;
  --text: #f6f6f7;
  --muted: #b3b3b8;
  --line: #2b2b2e;
  --accent: #ffd60a;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--background);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
  line-height: 1.55;
}

a {
  color: var(--accent);
}

.page {
  width: min(760px, calc(100% - 32px));
  margin: 0 auto;
  padding: 40px 0 56px;
}

.nav {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
  color: var(--muted);
}

.nav a {
  text-decoration: none;
}

.panel {
  border: 1px solid var(--line);
  border-radius: 18px;
  background: var(--surface);
  padding: 28px;
}

h1,
h2 {
  line-height: 1.15;
}

h1 {
  margin: 0 0 20px;
  font-size: clamp(2rem, 7vw, 3.5rem);
}

h2 {
  margin-top: 32px;
  font-size: 1.35rem;
}

p,
li {
  color: var(--muted);
  font-size: 1rem;
}

code {
  color: var(--text);
  background: rgba(255, 255, 255, 0.08);
  border-radius: 6px;
  padding: 0.1em 0.35em;
}

.links {
  display: grid;
  gap: 12px;
  margin-top: 24px;
}

.links a {
  display: block;
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 16px 18px;
  background: var(--surface);
  font-weight: 700;
  text-decoration: none;
}

.footer {
  margin-top: 32px;
  color: var(--muted);
  font-size: 0.9rem;
}

@media (prefers-color-scheme: light) {
  :root {
    --background: #f7f7f8;
    --surface: #ffffff;
    --text: #111113;
    --muted: #55555c;
    --line: #d8d8de;
    --accent: #8a6b00;
  }
}</style>
</head>
<body>
  <main class="page">
    <section class="panel">
      <h1>Smart Currency</h1>
      <p>Official support and privacy information for the Smart Currency iPhone app.</p>
      <div class="links">
        <a href="support/">Support</a>
        <a href="privacy/">Privacy Policy</a>
      </div>
    </section>
  </main>
</body>
</html>
